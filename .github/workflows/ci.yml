name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: moonbitlang/setup-moonbit@v2
        with:
          version: latest

      - name: Check formatting
        run: moon fmt --check

      - name: Run tests
        run: moon test

      - name: Generate interface
        run: moon info

      - name: Build
        run: moon build
